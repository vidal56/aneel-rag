services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: aneel_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  gaia:
    build:
      context: .
      dockerfile: Dockerfile.gaia
    container_name: aneel_gaia
    ports:
      - "8080:8080"
    volumes:
      - models:/models
    env_file:
      - .env
    environment:
      - GPU_MEMORY_UTILIZATION=0.70
      - MAX_MODEL_LEN=8192
      - DTYPE=bfloat16
      - MODEL_PATH=/models/gaia-4b
      - HOST=0.0.0.0
      - PORT=8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  embedding:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    container_name: aneel_embedding
    ports:
      - "8082:8082"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - BGE_MODEL_PATH=BAAI/bge-m3
      - PORT=8082
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  adk:
    build:
      context: .
      dockerfile: Dockerfile.adk
    container_name: aneel_adk
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - EMBEDDING_URL=http://embedding:8082
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_APIKEY=
      - GAIA_API_URL=http://gaia:8080/v1
    restart: unless-stopped

volumes:
  qdrant_data:
    external: true
    name: aneel-rag_qdrant_data
  models:
    external: true
    name: aneel-rag_models
  hf_cache:
    external: true
    name: aneel-rag_hf_cache
